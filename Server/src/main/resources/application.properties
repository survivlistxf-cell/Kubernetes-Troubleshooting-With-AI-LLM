server.port=8090

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Payload limits (tune later)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ollama (local LLM)
# Default Ollama server: http://localhost:11434
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Choose any installed Ollama model (example: llama3.1)
ollama.model=${OLLAMA_MODEL:llama3.1}

# Basic request tuning
ollama.temperature=${OLLAMA_TEMPERATURE:0.2}
ollama.timeout-seconds=${OLLAMA_TIMEOUT_SECONDS:60}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/kubexplain_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.file.name=logs/server.log
logging.level.root=INFO
logging.level.com.kdiag=INFO
logging.logback.rollingpolicy.max-file-size=10MB
# 99999 pt nelimitat
logging.logback.rollingpolicy.max-history=7
