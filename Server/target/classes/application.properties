server.port=8090

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# Payload limits (tune later)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ollama (local LLM)
# Default Ollama server: http://localhost:11434
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Choose any installed Ollama model (example: llama3.1)
ollama.model=${OLLAMA_MODEL:llama3.1}

# Basic request tuning
ollama.temperature=${OLLAMA_TEMPERATURE:0.2}
ollama.timeout-seconds=${OLLAMA_TIMEOUT_SECONDS:60}
ollama.num-ctx=${OLLAMA_NUM_CTX:8192}
ollama.embedding-model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
ollama.embedding-timeout-seconds=${OLLAMA_EMBEDDING_TIMEOUT:30}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/kubexplain_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# PostgreSQLDialect is auto-detected by Hibernate from the JDBC URL — no need to set
# spring.jpa.database-platform explicitly (Hibernate emits HHH90000025 otherwise).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable Open-In-View: prevents JPA sessions staying open during view rendering
# (silences the JpaBaseConfiguration warning and avoids accidental lazy queries
# during HTTP response serialization).
spring.jpa.open-in-view=false

# Lucene BM25 index
kdiag.lucene.dir=./lucene_index
kdiag.lucene.topk=12

# Retrieval engine selection: lucene (default) or elastic
# Override with env var KDIAG_RETRIEVAL_ENGINE=elastic to activate ElasticSearch
kdiag.retrieval.engine=${KDIAG_RETRIEVAL_ENGINE:lucene}

# ElasticSearch (used only when kdiag.retrieval.engine=elastic)
kdiag.elastic.uri=${KDIAG_ELASTIC_URI:http://localhost:9200}
kdiag.elastic.index=${KDIAG_ELASTIC_INDEX:kdiag-chunks}
kdiag.elastic.topk=${KDIAG_ELASTIC_TOPK:12}

# Dynamic-page cleanup
kdiag.cleanup.dynamic.enabled=${KDIAG_CLEANUP_ENABLED:true}
kdiag.cleanup.dynamic.age-days=${KDIAG_CLEANUP_AGE_DAYS:30}
kdiag.cleanup.dynamic.cron=${KDIAG_CLEANUP_CRON:0 0 3 * * SUN}
kdiag.cleanup.dynamic.dry-run=${KDIAG_CLEANUP_DRY_RUN:false}

# Logging Configuration
logging.file.name=logs/server.log
logging.level.root=INFO
logging.level.com.kdiag=INFO
logging.logback.rollingpolicy.max-file-size=10MB
# 99999 pt nelimitat
logging.logback.rollingpolicy.max-history=7
