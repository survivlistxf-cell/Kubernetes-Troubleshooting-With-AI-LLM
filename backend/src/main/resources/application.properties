spring.application.name=springboot-backend
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/kubexplain_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

# PostgreSQLDialect is auto-detected by Hibernate from the JDBC URL — no need to set
# spring.jpa.database-platform explicitly (Hibernate emits HHH90000025 otherwise).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Disable Open-In-View: prevents JPA sessions staying open during view rendering
# (silences the JpaBaseConfiguration warning and avoids accidental lazy queries
# during HTTP response serialization).
spring.jpa.open-in-view=false

# H2 is only a test-scope convenience (integration tests run on jdbc:h2:mem with
# MODE=PostgreSQL); production uses PostgreSQL. Keep the H2 web console OFF so its
# servlet is never registered — a second mappable servlet next to DispatcherServlet
# breaks Spring Security's request-matcher resolution at startup.
spring.h2.console.enabled=false

# CORS Configuration
server.servlet.context-path=/

# --- ROTATIA SI STERGEREA LOG-URILOR ---
logging.file.name=logs/backend.log
logging.level.root=INFO
logging.level.com.example=INFO

# Dimensiunea maxima a unui fisier inainte de a fi arhivat (10MB)
logging.logback.rollingpolicy.max-file-size=10MB

# Stergerea automata: Cate zile sa fie pastrate arhivele inainte de a fi sterse automat (setat la 7 zile).
# -> Daca vrei sa OPRESTI stergerea, schimba pur si simplu in 9999 (pentru a le pastra infinit).
logging.logback.rollingpolicy.max-history=7

# AI Server (gateway) configuration
ai.server.base-url=http://localhost:8090

# --- JWT authentication ---
# HMAC-SHA256 signing secret. MUST be >= 32 bytes. Override via env in any real
# deployment (do NOT ship this default).
security.jwt.secret=${JWT_SECRET:change-me-please-use-a-long-random-secret-key-32+bytes}
# Token lifetime in milliseconds (default 24h).
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Cluster kubeconfig security ---
# When true (default), a cluster whose kubeconfig can perform write operations
# (create/delete pods, patch deployments, create secrets) is rejected at add time.
# Set to false to allow such kubeconfigs but surface an explicit over-privileged
# warning in the API response.
kubexplain.cluster.enforce-readonly-kubeconfig=${KUBEXPLAIN_ENFORCE_READONLY_KUBECONFIG:false}

# Multipart file upload (for kubeconfig uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
