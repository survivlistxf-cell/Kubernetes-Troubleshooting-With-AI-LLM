# Test profile: in-memory H2 so security/auth integration tests need no Postgres.
spring.datasource.url=jdbc:h2:mem:authtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Deterministic JWT settings for tests.
security.jwt.secret=test-secret-key-that-is-long-enough-for-hs256-0123456789
security.jwt.expiration-ms=86400000
