version: '3.8'

services:
  # Ollama LLM runtime (OpenAI-compatible endpoint exposed at /v1/chat/completions)
  ollama:
    image: ollama/ollama:latest
    container_name: kubexplain-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-network
    restart: unless-stopped

  # Optional one-time init container to pull the model so first request is fast.
  # Run it when needed:
  #   docker compose -f docker-compose-ai.yml run --rm ollama-init
  ollama-init:
    image: ollama/ollama:latest
    container_name: kubexplain-ollama-init
    depends_on:
      - ollama
    entrypoint: ["sh", "-lc"]
    command: "sleep 2; ollama pull ${OLLAMA_MODEL:-llama3.1}"
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODEL=llama3.1
    networks:
      - ai-network
    restart: "no"

  # Spring Boot AI server (port 8090) that calls Ollama.
  ai-server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: kubexplain-ai-server
    ports:
      - "8090:8090"
    environment:
      # Point AI server to the Ollama service inside the compose network
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
      - OLLAMA_TEMPERATURE=0.2
      - OLLAMA_TIMEOUT_SECONDS=60
      # Ensure the server listens on the expected port in containers
      - SERVER_PORT=8090
    depends_on:
      - ollama
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
