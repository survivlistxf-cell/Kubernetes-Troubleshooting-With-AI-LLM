version: '3.8'

services:
  # PostgreSQL Database
  # NOTE: uses pgvector/pgvector:pg16 instead of plain postgres:16-alpine so the
  # `vector` extension is available out of the box (required by the qa_feedback
  # table — Hibernate fails to create it otherwise with `type "vector" does not exist`).
  postgres:
    image: pgvector/pgvector:pg16
    container_name: proiect-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kubexplain_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - proiect-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proiect-backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx1536m -Xms768m
      - MAVEN_OPTS=-Xmx1536m -Xms768m
      - SPRING_PROFILES_ACTIVE=docker
      - KUBECONFIG=/root/.kube/config
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/kubexplain_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    mem_limit: 2g
    memswap_limit: 2g
    volumes:
      - /home/ubuntu/.kube/config:/root/.kube/config:ro
      - /usr/bin/kubectl:/usr/bin/kubectl:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "kubernetes.docker.internal:host-gateway"
      - "host.docker.internal:host-gateway"
    networks:
      - proiect-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/hello"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Node.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proiect-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      - REACT_APP_API_URL=http://backend:8080
      - BACKEND_URL=http://backend:8080
    mem_limit: 1g
    memswap_limit: 1g
    networks:
      - proiect-network
    depends_on:
      - backend
    restart: unless-stopped

  # ElasticSearch — single-node, no TLS, no auth (local dev only)
  # Activated when kdiag.retrieval.engine=elastic in the AI-server config.
  # NOTE: vm.max_map_count must be >= 262144 on Linux hosts:
  #   sudo sysctl -w vm.max_map_count=262144
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: proiect-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - proiect-network
    mem_limit: 1g
    memswap_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 40s

networks:
  proiect-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
