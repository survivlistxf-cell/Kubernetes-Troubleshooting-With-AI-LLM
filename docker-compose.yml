version: '3.8'

services:
  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proiect-backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx1536m -Xms768m
      - MAVEN_OPTS=-Xmx1536m -Xms768m
      - SPRING_PROFILES_ACTIVE=docker
      - KUBECONFIG=/root/.kube/config
    mem_limit: 2g
    memswap_limit: 2g
    volumes:
      - /home/ubuntu/.kube/config:/root/.kube/config:ro
      - /usr/bin/kubectl:/usr/bin/kubectl:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "kubernetes.docker.internal:host-gateway"
      - "host.docker.internal:host-gateway"
    networks:
      - proiect-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/hello"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_period: 40s

  # Node.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proiect-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      - REACT_APP_API_URL=http://backend:8080
    mem_limit: 1g
    memswap_limit: 1g
    networks:
      - proiect-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  proiect-network:
    driver: bridge
