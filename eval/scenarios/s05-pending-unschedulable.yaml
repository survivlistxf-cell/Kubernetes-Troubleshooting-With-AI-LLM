# S05 — Pending: cereri de resurse peste capacitatea oricărui nod.
# Cauza așteptată: niciun nod nu satisface cererea; se ajustează requests.
apiVersion: v1
kind: Pod
metadata:
  name: s05-pending
  namespace: kubexplain-eval
  labels: { eval-scenario: s05 }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests: { memory: "1000Gi", cpu: "500" }
