# S07 — ConfigMap lipsă: pod care referă un ConfigMap inexistent.
# Simptom: CreateContainerConfigError. Cauza așteptată: se creează resursa lipsă.
apiVersion: v1
kind: Pod
metadata:
  name: s07-missing-cm
  namespace: kubexplain-eval
  labels: { eval-scenario: s07 }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      envFrom:
        - configMapRef:
            name: configmap-care-nu-exista
