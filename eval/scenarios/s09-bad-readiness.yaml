# S09 — Readiness probe greșită: verifică un path inexistent → pod niciodată Ready,
# scos din Endpoints-urile Service-ului. Cauza așteptată: se corectează path-ul probei.
apiVersion: v1
kind: Pod
metadata:
  name: s09-bad-readiness
  namespace: kubexplain-eval
  labels: { eval-scenario: s09, app: s09-web }
spec:
  containers:
    - name: web
      image: nginx:1.25
      ports: [{ containerPort: 80 }]
      readinessProbe:
        httpGet: { path: /pagina-inexistenta, port: 80 }
        periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: s09-web
  namespace: kubexplain-eval
spec:
  selector: { app: s09-web }
  ports: [{ port: 80, targetPort: 80 }]
