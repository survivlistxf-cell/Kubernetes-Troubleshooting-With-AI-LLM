# S10 — NetworkPolicy restrictivă: deny-all pe ingress blochează traficul legitim
# către server. Clientul primește timeout. Cauza așteptată: se relaxează politica.
# NOTĂ: necesită un CNI care aplică NetworkPolicy (Calico/Cilium etc.).
apiVersion: v1
kind: Pod
metadata:
  name: s10-server
  namespace: kubexplain-eval
  labels: { eval-scenario: s10, app: s10-server }
spec:
  containers:
    - name: web
      image: nginx:1.25
      ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: s10-server
  namespace: kubexplain-eval
spec:
  selector: { app: s10-server }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: s10-deny-all-ingress
  namespace: kubexplain-eval
spec:
  podSelector: { matchLabels: { app: s10-server } }
  policyTypes: ["Ingress"]
---
apiVersion: v1
kind: Pod
metadata:
  name: s10-client
  namespace: kubexplain-eval
  labels: { eval-scenario: s10 }
spec:
  restartPolicy: Always
  containers:
    - name: client
      image: busybox:1.36
      command: ["sh", "-c", "while true; do wget -T 3 -q -O- http://s10-server.kubexplain-eval.svc || echo 'REQUEST FAILED'; sleep 10; done"]
