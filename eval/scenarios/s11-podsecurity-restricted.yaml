# S11 (dinamic) — Pod Security Admission: namespace cu enforce=restricted respinge
# un pod care rulează ca root. Podul NU se creează — dovada e mesajul de respingere
# de la `kubectl apply` + evenimentele namespace-ului.
# Scenariu destinat regăsirii DINAMICE: paginile despre Pod Security Standards
# sunt excluse deliberat din baza de cunoștințe statică (vezi eval/README.md).
apiVersion: v1
kind: Namespace
metadata:
  name: kubexplain-eval-psa
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
apiVersion: v1
kind: Pod
metadata:
  name: s11-psa-violator
  namespace: kubexplain-eval-psa
  labels: { eval-scenario: s11 }
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      securityContext:
        runAsUser: 0
        allowPrivilegeEscalation: true
