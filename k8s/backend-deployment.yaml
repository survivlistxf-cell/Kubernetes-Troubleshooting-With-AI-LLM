apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      app.kubernetes.io/name: kubexplain
      app.kubernetes.io/part-of: kubexplain
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: kubexplain
        app.kubernetes.io/part-of: kubexplain
    spec:
      containers:
        - name: backend
          image: axiiiiiiii/proiect_licenta-backend:latest
          # Always: la fiecare rollout trage :latest proaspat din DockerHub
          # (altfel nodul foloseste imaginea veche din cache).
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/kubexplain_db
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: postgres
            - name: AI_SERVER_BASE_URL
              value: http://ai-server:8090
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5