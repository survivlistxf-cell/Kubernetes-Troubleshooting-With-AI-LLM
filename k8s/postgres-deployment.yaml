apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  # Single-instance DB on a ReadWriteOnce PVC: the old pod must release the volume before
  # the new one starts. RollingUpdate would run both pods at once and they would fight over
  # the RWO volume. Recreate stops the old pod first, then starts the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          # pgvector/pgvector:pg16 ships pgvector preinstalled — required by the
          # qa_feedback.embedding column (vector(768)).  See docker-compose.yml
          # and init.sql for the same change in the Compose dev environment.
          image: pgvector/pgvector:pg16
          imagePullPolicy: Always
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: postgres-config
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          readinessProbe:
            exec:
              command:
                - sh
                - -lc
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -lc
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: postgres-data
          # cinder-csi (dynamic) is broken cluster-wide and a `local` PV would force the
          # pod onto one specific node. hostPath persists data across pod restarts without
          # a provisioner or PV/PVC, and DirectoryOrCreate makes the dir on first use.
          # NOTE: data lives on whichever node the pod runs on; if the pod is rescheduled
          # to a different node it starts from an empty dir. See nodeSelector note below.
          hostPath:
            path: /mnt/kubexplain/postgres
            type: DirectoryOrCreate
        - name: postgres-init-sql
          configMap:
            name: postgres-init-sql
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Equal"
          value: ""
          effect: "NoSchedule"